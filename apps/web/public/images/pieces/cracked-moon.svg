<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="cm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E28"/>
      <stop offset="40%" stop-color="#121840"/>
      <stop offset="100%" stop-color="#0E1430"/>
    </linearGradient>
    <radialGradient id="cm-moon" cx="0.48" cy="0.48" r="0.5">
      <stop offset="0%" stop-color="#F5F0E0"/>
      <stop offset="40%" stop-color="#E8E0C8"/>
      <stop offset="80%" stop-color="#D8D0B8"/>
      <stop offset="100%" stop-color="#C8C0A8"/>
    </radialGradient>
    <radialGradient id="cm-halo" cx="0.47" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#E8E0C8" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#D8D0B8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#121840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#cm-sky)"/>
  <!-- Stars — tiny dots -->
  <g fill="#E8E0D0" opacity="0.4">
    <circle cx="50" cy="40" r="0.8"/><circle cx="120" cy="80" r="1"/>
    <circle cx="200" cy="30" r="0.6"/><circle cx="320" cy="60" r="0.9"/>
    <circle cx="480" cy="45" r="0.7"/><circle cx="550" cy="100" r="1"/>
    <circle cx="80" cy="160" r="0.8"/><circle cx="530" cy="200" r="0.6"/>
    <circle cx="40" cy="280" r="0.9"/><circle cx="560" cy="320" r="0.7"/>
    <circle cx="100" cy="420" r="0.8"/><circle cx="520" cy="450" r="1"/>
    <circle cx="60" cy="550" r="0.7"/><circle cx="540" cy="580" r="0.9"/>
    <circle cx="150" cy="650" r="0.6"/><circle cx="490" cy="680" r="0.8"/>
    <circle cx="80" cy="720" r="1"/><circle cx="550" cy="740" r="0.7"/>
    <circle cx="250" cy="700" r="0.6"/><circle cx="400" cy="720" r="0.8"/>
    <circle cx="170" cy="120" r="0.5"/><circle cx="450" cy="140" r="0.7"/>
    <circle cx="30" cy="380" r="0.6"/><circle cx="570" cy="480" r="0.8"/>
  </g>
  <!-- Brighter stars -->
  <g fill="#F0E8D0" opacity="0.7">
    <circle cx="95" cy="95" r="1.2"/><circle cx="510" cy="160" r="1.3"/>
    <circle cx="460" cy="680" r="1.1"/><circle cx="140" cy="600" r="1.2"/>
    <circle cx="45" cy="460" r="1"/><circle cx="555" cy="390" r="1.3"/>
  </g>
  <!-- Moon halo -->
  <circle cx="280" cy="340" r="200" fill="url(#cm-halo)"/>
  <!-- Large pale moon — slightly off-center -->
  <circle cx="280" cy="340" r="140" fill="url(#cm-moon)" opacity="0.9"/>
  <!-- Surface subtle variations -->
  <circle cx="260" cy="310" r="20" fill="#D0C8B0" opacity="0.15"/>
  <circle cx="310" cy="360" r="15" fill="#C8C0A8" opacity="0.12"/>
  <circle cx="250" cy="380" r="12" fill="#D8D0B8" opacity="0.1"/>
  <circle cx="320" cy="300" r="10" fill="#C0B8A0" opacity="0.12"/>
  <!-- Kintsugi cracks — thin irregular lines filled with gold -->
  <path d="M200,290 Q230,310 250,340 Q265,370 280,410 Q290,440 310,460" 
    fill="none" stroke="#D4A040" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <path d="M250,340 Q270,335 300,330 Q330,328 360,335" 
    fill="none" stroke="#D4A040" stroke-width="1.8" opacity="0.65" stroke-linecap="round"/>
  <path d="M300,330 Q308,355 310,380 Q312,400 318,420" 
    fill="none" stroke="#D4A040" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M230,310 Q225,330 215,350 Q205,370 195,385" 
    fill="none" stroke="#D4A040" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <path d="M340,250 Q330,275 320,295 Q315,310 320,330" 
    fill="none" stroke="#D4A040" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
  <path d="M280,410 Q265,420 250,428 Q238,432 225,430" 
    fill="none" stroke="#D4A040" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <path d="M360,335 Q375,345 385,360 Q392,375 395,390" 
    fill="none" stroke="#D4A040" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Gold glow along cracks -->
  <path d="M200,290 Q230,310 250,340 Q265,370 280,410 Q290,440 310,460" 
    fill="none" stroke="#E8C050" stroke-width="5" opacity="0.1" stroke-linecap="round"/>
  <path d="M250,340 Q270,335 300,330 Q330,328 360,335" 
    fill="none" stroke="#E8C050" stroke-width="4" opacity="0.08" stroke-linecap="round"/>
  <path d="M340,250 Q330,275 320,295 Q315,310 320,330" 
    fill="none" stroke="#E8C050" stroke-width="4" opacity="0.08" stroke-linecap="round"/>
</svg>