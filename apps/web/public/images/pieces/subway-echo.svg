<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="se-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D0C0"/>
      <stop offset="100%" stop-color="#C8C0B0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#se-bg)"/>
  <!-- Layered torn poster rectangles -->
  <!-- Back layer — faded red poster -->
  <rect x="20" y="50" width="350" height="250" rx="2" fill="#B85050" opacity="0.35" transform="rotate(-2,195,175)"/>
  <!-- Blue poster fragment -->
  <rect x="200" y="120" width="380" height="300" rx="2" fill="#4060A0" opacity="0.3" transform="rotate(3,390,270)"/>
  <!-- Yellow poster fragment -->
  <rect x="50" y="300" width="280" height="200" rx="2" fill="#C8A830" opacity="0.3" transform="rotate(-1,190,400)"/>
  <!-- Smaller overlapping fragments -->
  <rect x="300" y="400" width="250" height="180" rx="2" fill="#B85050" opacity="0.25" transform="rotate(2,425,490)"/>
  <rect x="80" y="500" width="300" height="150" rx="2" fill="#4060A0" opacity="0.25" transform="rotate(-3,230,575)"/>
  <rect x="350" y="550" width="220" height="200" rx="2" fill="#C8A830" opacity="0.28" transform="rotate(1,460,650)"/>
  <rect x="20" y="650" width="280" height="140" rx="2" fill="#B85050" opacity="0.2" transform="rotate(-2,160,720)"/>
  <!-- Torn edges — irregular shapes overlapping -->
  <path d="M370,50 L375,55 L368,65 L372,80 L365,95 L370,110 L366,125 L370,140" fill="none" stroke="#D8D0C0" stroke-width="3" opacity="0.5"/>
  <path d="M200,420 L205,425 L198,440 L202,455 L196,470 L200,485 L195,500" fill="none" stroke="#D8D0C0" stroke-width="3" opacity="0.5"/>
  <!-- Abstract letter-shapes (not real words) — fragments of text -->
  <g fill="#222" opacity="0.15">
    <rect x="60" y="100" width="30" height="6" rx="1"/>
    <rect x="100" y="100" width="20" height="6" rx="1"/>
    <rect x="60" y="112" width="50" height="5" rx="1"/>
    <rect x="60" y="122" width="35" height="5" rx="1"/>
    <rect x="100" y="122" width="15" height="5" rx="1"/>
  </g>
  <g fill="#222" opacity="0.12" transform="rotate(3,400,200)">
    <rect x="320" y="180" width="40" height="7" rx="1"/>
    <rect x="370" y="180" width="25" height="7" rx="1"/>
    <rect x="320" y="193" width="55" height="6" rx="1"/>
    <rect x="320" y="204" width="30" height="6" rx="1"/>
  </g>
  <g fill="#222" opacity="0.1">
    <rect x="100" y="360" width="35" height="5" rx="1"/>
    <rect x="145" y="360" width="20" height="5" rx="1"/>
    <rect x="100" y="370" width="60" height="4" rx="1"/>
  </g>
  <!-- Walking figure stencil — black silhouette -->
  <g transform="translate(280,340)">
    <!-- Head -->
    <circle cx="0" cy="-55" r="14" fill="#111"/>
    <!-- Body -->
    <line x1="0" y1="-41" x2="0" y2="0" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <!-- Left arm forward -->
    <line x1="0" y1="-30" x2="-20" y2="-10" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Right arm back -->
    <line x1="0" y1="-30" x2="18" y2="-15" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Left leg forward -->
    <line x1="0" y1="0" x2="-18" y2="30" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Right leg back -->
    <line x1="0" y1="0" x2="15" y2="28" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <!-- Feet -->
    <line x1="-18" y1="30" x2="-25" y2="32" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="28" x2="22" y2="30" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Drips from figure -->
  <rect x="277" y="375" width="2.5" height="30" rx="1.2" fill="#111" opacity="0.3"/>
  <rect x="285" y="380" width="2" height="25" rx="1" fill="#111" opacity="0.25"/>
  <!-- Spray-paint overspray effects — dots radiating -->
  <g fill="#111" opacity="0.08">
    <circle cx="260" cy="285" r="1.5"/><circle cx="252" cy="290" r="1"/>
    <circle cx="268" cy="278" r="1.2"/><circle cx="245" cy="295" r="0.8"/>
    <circle cx="275" cy="272" r="1"/><circle cx="240" cy="300" r="1.3"/>
    <circle cx="310" cy="282" r="1.5"/><circle cx="318" cy="290" r="1"/>
    <circle cx="302" cy="275" r="1.2"/><circle cx="325" cy="298" r="0.8"/>
  </g>
  <!-- More overspray around figure legs -->
  <g fill="#111" opacity="0.06">
    <circle cx="255" cy="370" r="1"/><circle cx="248" cy="378" r="1.5"/>
    <circle cx="310" cy="368" r="1.2"/><circle cx="318" cy="375" r="0.8"/>
    <circle cx="242" cy="385" r="1"/><circle cx="322" cy="382" r="1.3"/>
  </g>
  <!-- Red spray accent -->
  <ellipse cx="450" cy="480" rx="30" ry="25" fill="#CC3030" opacity="0.15"/>
  <g fill="#CC3030" opacity="0.06">
    <circle cx="425" cy="475" r="1.5"/><circle cx="418" cy="480" r="1"/>
    <circle cx="475" cy="485" r="1.2"/><circle cx="482" cy="478" r="0.8"/>
  </g>
  <!-- Blue spray accent -->
  <ellipse cx="130" cy="620" rx="35" ry="28" fill="#3050A0" opacity="0.12"/>
  <!-- Grungy layer — subtle overall grime -->
  <rect width="600" height="800" fill="#8B8070" opacity="0.03"/>
</svg>