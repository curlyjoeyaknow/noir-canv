<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="indigo-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="30%" style="stop-color:#2d2d5a"/>
      <stop offset="55%" style="stop-color:#4a4a7a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="sunrise" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="20%" style="stop-color:#f4a261"/>
      <stop offset="100%" style="stop-color:#2d2d5a"/>
    </linearGradient>
    <radialGradient id="sun-glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#indigo-sky)"/>
  <rect x="0" y="400" width="600" height="400" fill="url(#sunrise)"/>
  <ellipse cx="300" cy="420" rx="350" ry="120" fill="url(#sun-glow)"/>
</svg>
