<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="cs-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1528"/>
      <stop offset="30%" stop-color="#1A2240"/>
      <stop offset="55%" stop-color="#222D48"/>
      <stop offset="60%" stop-color="#283550"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>
    <linearGradient id="cs-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#283548"/>
      <stop offset="30%" stop-color="#1E2A3C"/>
      <stop offset="60%" stop-color="#172232"/>
      <stop offset="100%" stop-color="#0E1820"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#cs-sky)"/>
  <!-- Dense cloud mass -->
  <ellipse cx="200" cy="120" rx="200" ry="80" fill="#1A2038" opacity="0.5"/>
  <ellipse cx="400" cy="150" rx="180" ry="90" fill="#182040" opacity="0.4"/>
  <ellipse cx="300" cy="100" rx="250" ry="70" fill="#1A1E35" opacity="0.3"/>
  <ellipse cx="150" cy="200" rx="160" ry="60" fill="#202840" opacity="0.35"/>
  <ellipse cx="450" cy="220" rx="150" ry="70" fill="#1E2538" opacity="0.3"/>
  <ellipse cx="300" cy="280" rx="220" ry="50" fill="#222A42" opacity="0.25"/>
  <!-- Horizon/cloud base -->
  <rect x="0" y="470" width="600" height="330" fill="url(#cs-sea)"/>
  <!-- Waves — curved lines in varying dark blues -->
  <path d="M0,500 Q50,495 100,500 Q150,505 200,498 Q250,492 300,500 Q350,508 400,500 Q450,493 500,500 Q550,507 600,500" fill="none" stroke="#2A3850" stroke-width="1" opacity="0.4"/>
  <path d="M0,530 Q60,525 120,532 Q180,538 240,528 Q300,520 360,530 Q420,540 480,530 Q540,522 600,530" fill="none" stroke="#253245" stroke-width="0.8" opacity="0.35"/>
  <path d="M0,558 Q70,552 140,560 Q210,567 280,555 Q350,545 420,558 Q490,568 560,555 Q580,552 600,555" fill="none" stroke="#2A3548" stroke-width="1" opacity="0.3"/>
  <path d="M0,585 Q80,580 150,588 Q220,594 290,582 Q360,572 430,585 Q500,595 570,582 Q590,578 600,582" fill="none" stroke="#222E42" stroke-width="0.8" opacity="0.3"/>
  <path d="M0,615 Q60,610 130,618 Q200,625 270,612 Q340,602 410,615 Q480,625 550,612 Q580,608 600,612" fill="none" stroke="#1E2A3C" stroke-width="1" opacity="0.25"/>
  <path d="M0,645 Q70,640 140,648 Q210,655 280,642 Q350,633 420,645 Q490,655 560,642 L600,640" fill="none" stroke="#1A2538" stroke-width="0.8" opacity="0.2"/>
  <path d="M0,680 Q80,675 160,682 Q240,688 320,678 Q400,670 480,680 Q560,688 600,682" fill="none" stroke="#172232" stroke-width="1" opacity="0.2"/>
  <path d="M0,715 Q90,710 180,718 Q270,724 360,712 Q450,704 540,715 L600,712" fill="none" stroke="#152030" stroke-width="0.8" opacity="0.15"/>
  <path d="M0,750 Q100,745 200,752 Q300,758 400,748 Q500,740 600,750" fill="none" stroke="#121C28" stroke-width="1" opacity="0.15"/>
  <!-- Lightning/moonlight — single diagonal white line -->
  <line x1="420" y1="60" x2="350" y2="470" stroke="#E8E8F0" stroke-width="1.5" opacity="0.35"/>
  <!-- Light glow along the beam -->
  <line x1="420" y1="60" x2="350" y2="470" stroke="#C0C8E0" stroke-width="8" opacity="0.04"/>
  <line x1="420" y1="60" x2="350" y2="470" stroke="#A0A8C0" stroke-width="20" opacity="0.02"/>
  <!-- Cloud illumination near lightning origin -->
  <ellipse cx="420" cy="80" rx="40" ry="25" fill="#3A4560" opacity="0.2"/>
  <ellipse cx="400" cy="150" rx="30" ry="20" fill="#354058" opacity="0.15"/>
</svg>