<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="moss-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a27"/>
      <stop offset="100%" style="stop-color:#1a3d1a"/>
    </linearGradient>
    <linearGradient id="moss-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d7a37"/>
      <stop offset="100%" style="stop-color:#2d5a27"/>
    </linearGradient>
    <linearGradient id="moss-light" x1="0%" y1="0%" x2="100%" y2="100%">
