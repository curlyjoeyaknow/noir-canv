  </defs>
  <rect width="600" height="800" fill="#4a5a4a"/>
  <rect x="80" y="150" width="160" height="200" rx="5" fill="url(#stone)"/>
  <rect x="100" y="170" width="120" height="160" fill="url(#moss-dark)"/>
  <rect x="360" y="200" width="160" height="180" rx="5" fill="url(#stone)"/>
  <rect x="380" y="220" width="120" height="140" fill="url(#moss-mid)"/>
  <rect x="200" y="400" width="200" height="250" rx="8" fill="url(#stone)"/>
  <rect x="220" y="420" width="160" height="210" fill="url(#moss-light)"/>
