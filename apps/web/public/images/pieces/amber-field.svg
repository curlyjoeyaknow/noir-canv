<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="amber-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b"/>
      <stop offset="30%" style="stop-color:#e8c068"/>
      <stop offset="60%" style="stop-color:#c9962e"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <pattern id="striations" patternUnits="userSpaceOnUse" width="600" height="4">
      <line x1="0" y1="0" x2="600" y2="0" stroke="#c9962e" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#amber-main)"/>
  <rect width="600" height="800" fill="url(#striations)"/>
</svg>
