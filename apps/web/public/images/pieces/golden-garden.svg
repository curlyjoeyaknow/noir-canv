  <circle cx="300" cy="400" r="40" fill="url(#gg-center)"/>
  <!-- Stamens in center -->
  <g fill="#D4A040" opacity="0.6">
    <circle cx="288" cy="388" r="3"/><circle cx="312" cy="388" r="3"/>
    <circle cx="280" cy="400" r="2.5"/><circle cx="320" cy="400" r="2.5"/>
    <circle cx="288" cy="412" r="3"/><circle cx="312" cy="412" r="3"/>
    <circle cx="300" cy="382" r="2.5"/><circle cx="300" cy="418" r="2.5"/>
    <circle cx="296" cy="396" r="2"/><circle cx="304" cy="404" r="2"/>
  </g>
  <!-- Inner ring of tiny details -->
  <circle cx="300" cy="400" r="30" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.3"/>
  <circle cx="300" cy="400" r="50" fill="none" stroke="#C4943A" stroke-width="0.5" opacity="0.15"/>
</svg>