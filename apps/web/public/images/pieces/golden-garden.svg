  <path d="M300,680 Q240,620 210,550 Q190,480 220,420 Q260,400 300,400 Q340,400 380,420 Q410,480 390,550 Q360,620 300,680 Z" fill="#D4A848" opacity="0.5"/>
  <path d="M120,400 Q170,460 220,490 Q260,500 300,480 Q310,460 310,420 Q310,400 300,400 Q260,430 220,420 Q170,400 120,400 Z" fill="#C4983A" opacity="0.5"/>
  <!-- Inner petals — deeper gold -->
  <path d="M300,200 Q340,250 360,310 Q370,360 340,390 Q320,400 300,400 Q280,400 260,390 Q230,360 240,310 Q260,250 300,200 Z" fill="#B88A28" opacity="0.55"/>
  <path d="M400,400 Q370,360 345,340 Q320,330 300,345 Q295,360 295,390 Q298,400 300,400 Q320,380 345,385 Q370,395 400,400 Z" fill="#A07828" opacity="0.55"/>
  <path d="M300,600 Q260,550 240,490 Q230,440 260,410 Q280,400 300,400 Q320,400 340,410 Q370,440 360,490 Q340,550 300,600 Z" fill="#B88A28" opacity="0.55"/>
  <path d="M200,400 Q230,440 255,460 Q280,470 300,455 Q305,440 305,410 Q302,400 300,400 Q280,420 255,415 Q230,405 200,400 Z" fill="#A07828" opacity="0.55"/>
  <!-- Diagonal petals -->
  <path d="M380,200 Q390,280 380,340 Q360,380 320,400 Q300,400 300,400 Q320,360 330,300 Q340,240 380,200 Z" fill="#C4A040" opacity="0.4"/>
  <path d="M220,200 Q210,280 220,340 Q240,380 280,400 Q300,400 300,400 Q280,360 270,300 Q260,240 220,200 Z" fill="#C4A040" opacity="0.4"/>
  <path d="M380,600 Q390,520 380,460 Q360,420 320,400 Q300,400 300,400 Q320,440 330,500 Q340,560 380,600 Z" fill="#C4A040" opacity="0.4"/>
  <path d="M220,600 Q210,520 220,460 Q240,420 280,400 Q300,400 300,400 Q280,440 270,500 Q260,560 220,600 Z" fill="#C4A040" opacity="0.4"/>
