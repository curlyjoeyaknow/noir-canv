  <path d="M300,750 Q220,680 180,600 Q160,520 200,440 Q240,400 300,400 Q360,400 400,440 Q440,520 420,600 Q380,680 300,750 Z" fill="#E8D090" opacity="0.5"/>
  <path d="M50,400 Q120,480 180,520 Q240,540 300,520 Q320,500 320,440 Q320,380 300,400 Q240,460 180,440 Q120,420 50,400 Z" fill="#F5DCA0" opacity="0.45"/>
