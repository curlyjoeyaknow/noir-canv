<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="gg-center" cx="0.5" cy="0.5" r="0.15">
      <stop offset="0%" stop-color="#3D2B1A"/>
      <stop offset="60%" stop-color="#5A3D20"/>
      <stop offset="100%" stop-color="#6B4A28"/>
    </radialGradient>
    <radialGradient id="gg-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E8C050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FBF0D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF0D8"/>
      <stop offset="100%" stop-color="#F5E8C8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#gg-bg)"/>
  <!-- Warm glow behind flower -->
  <ellipse cx="300" cy="400" rx="280" ry="350" fill="url(#gg-glow)"/>
  <!-- O'Keeffe style — large flower from above, filling frame -->
  <!-- Outermost petals — cream -->
  <path d="M300,50 Q380,120 420,200 Q440,280 400,360 Q360,400 300,400 Q240,400 200,360 Q160,280 180,200 Q220,120 300,50 Z" fill="#F5E2B0" opacity="0.5"/>
