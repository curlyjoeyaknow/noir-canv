<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="ray-red" x1="50%" y1="50%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="ray-orange" x1="50%" y1="50%" x2="25%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="ray-yellow" x1="50%" y1="50%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <linearGradient id="ray-green" x1="50%" y1="50%" x2="75%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="ray-blue" x1="50%" y1="50%" x2="100%" y2="25%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="ray-purple" x1="50%" y1="50%" x2="100%" y2="75%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="ray-pink" x1="50%" y1="50%" x2="75%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#c2185b"/>
    </linearGradient>
    <linearGradient id="ray-cyan" x1="50%" y1="50%" x2="25%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="#1a1a1a"/>
  <circle cx="300" cy="400" r="50" fill="#ffffff"/>
  <polygon points="300,400 300,50 350,400" fill="url(#ray-yellow)"/>
  <polygon points="300,400 550,150 300,350" fill="url(#ray-orange)"/>
  <polygon points="300,400 550,400 300,350" fill="url(#ray-red)"/>
  <polygon points="300,400 550,650 300,450" fill="url(#ray-purple)"/>
  <polygon points="300,400 300,750 350,400" fill="url(#ray-pink)"/>
  <polygon points="300,400 50,650 300,450" fill="url(#ray-blue)"/>
  <polygon points="300,400 50,400 300,350" fill="url(#ray-cyan)"/>
  <polygon points="300,400 50,150 300,350" fill="url(#ray-green)"/>
</svg>
