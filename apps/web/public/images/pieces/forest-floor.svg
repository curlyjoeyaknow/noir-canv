<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="forest-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723"/>
      <stop offset="50%" style="stop-color:#4e342e"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </linearGradient>
    <linearGradient id="leaf-fallen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e63"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </linearGradient>
    <linearGradient id="mushroom-cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="moss-patch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a27"/>
      <stop offset="100%" style="stop-color:#1a3d1a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#forest-bg)"/>
  <ellipse cx="150" cy="300" rx="80" ry="40" fill="url(#leaf-fallen)" transform="rotate(-20 150 300)"/>
  <ellipse cx="400" cy="400" rx="70" ry="35" fill="url(#leaf-fallen)" transform="rotate(30 400 400)"/>
  <ellipse cx="250" cy="550" rx="90" ry="45" fill="url(#leaf-fallen)" transform="rotate(-10 250 550)"/>
  <ellipse cx="100" cy="600" rx="60" ry="30" fill="url(#leaf-fallen)" transform="rotate(45 100 600)"/>
  <ellipse cx="200" cy="200" rx="25" ry="35" fill="url(#mushroom-cap)"/>
  <rect x="195" y="232" width="10" height="25" fill="#8d6e63"/>
  <ellipse cx="450" cy="250" rx="20" ry="28" fill="url(#mushroom-cap)"/>
  <rect x="447" y="275" width="6" height="20" fill="#8d6e63"/>
  <rect x="300" y="500" width="150" height="80" rx="10" fill="url(#moss-patch)"/>
</svg>
