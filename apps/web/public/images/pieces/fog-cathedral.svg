<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="fog-base" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="40%" style="stop-color:#6b6b6b"/>
      <stop offset="70%" style="stop-color:#8b8b8b"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="spire1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5a5a"/>
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="spire2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6a6a6a"/>
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="spire3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#333;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#fog-base)"/>
  <rect x="120" y="100" width="80" height="700" fill="url(#spire1)" opacity="0.8"/>
  <rect x="250" y="50" width="100" height="750" fill="url(#spire2)" opacity="0.7"/>
  <rect x="380" y="100" width="80" height="700" fill="url(#spire3)" opacity="0.8"/>
