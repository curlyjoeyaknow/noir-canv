<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#c2185b"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="#0a0a0a"/>
  <path d="M300 150 L300 400" stroke="url(#neon-blue)" stroke-width="12" fill="none" filter="url(#neon-glow)"/>
  <path d="M200 250 L300 400 L400 250" stroke="url(#neon-pink)" stroke-width="10" fill="none" filter="url(#neon-glow)"/>
  <path d="M250 350 L350 350" stroke="url(#neon-blue)" stroke-width="8" fill="none" filter="url(#neon-glow)"/>
  <path d="M300 400 L300 650" stroke="url(#neon-blue)" stroke-width="12" fill="none" filter="url(#neon-glow)"/>
</svg>
