<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <pattern id="pr-dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#FF0000" opacity="0.3"/>
    </pattern>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F0"/>
      <stop offset="100%" stop-color="#FFFFF0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#pr-bg)"/>
  <!-- Dynamic Kandinsky-meets-Lichtenstein composition -->
  <!-- Large red circle with ben-day dots -->
  <circle cx="200" cy="280" r="160" fill="#FF0033" stroke="#111" stroke-width="5"/>
  <circle cx="200" cy="280" r="160" fill="url(#pr-dots)" opacity="0.4"/>
  <!-- Blue triangle -->
  <polygon points="350,100 550,500 150,500" fill="#0044DD" stroke="#111" stroke-width="5" opacity="0.9"/>
  <!-- Yellow rectangle, rotated -->
  <rect x="320" y="200" width="200" height="300" rx="5" fill="#FFD700" stroke="#111" stroke-width="5" opacity="0.85" transform="rotate(15,420,350)"/>
  <!-- Overlapping shapes create intersections -->
  <!-- Smaller red circle -->
  <circle cx="450" cy="600" r="100" fill="#FF0033" stroke="#111" stroke-width="4" opacity="0.8"/>
  <!-- Small blue rectangle -->
  <rect x="50" y="550" width="150" height="180" rx="3" fill="#0044DD" stroke="#111" stroke-width="4" opacity="0.85"/>
  <!-- White circle on blue -->
  <circle cx="125" cy="630" r="40" fill="#FFFFFF" stroke="#111" stroke-width="3"/>
  <!-- Action lines suggesting movement -->
  <g stroke="#111" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="80" y1="120" x2="120" y2="100"/>
    <line x1="70" y1="140" x2="110" y2="120"/>
    <line x1="60" y1="160" x2="100" y2="140"/>
    <line x1="480" y1="80" x2="540" y2="60"/>
    <line x1="490" y1="100" x2="550" y2="80"/>
    <line x1="500" y1="120" x2="560" y2="100"/>
  </g>
  <!-- Yellow star burst -->
  <polygon points="500,150 510,170 530,175 515,190 520,210 500,200 480,210 485,190 470,175 490,170" fill="#FFD700" stroke="#111" stroke-width="2"/>
  <!-- Small geometric accents -->
  <circle cx="100" cy="80" r="15" fill="#FF0033" stroke="#111" stroke-width="2"/>
  <rect x="520" y="700" width="40" height="40" fill="#0044DD" stroke="#111" stroke-width="2" transform="rotate(20,540,720)"/>
  <polygon points="300,720 320,690 340,720" fill="#FFD700" stroke="#111" stroke-width="2"/>
  <!-- KAWS X in the white circle -->
  <g transform="translate(125,630)" stroke="#111" stroke-width="3" stroke-linecap="round">
    <line x1="-12" y1="-12" x2="12" y2="12"/>
    <line x1="12" y1="-12" x2="-12" y2="12"/>
  </g>
</svg>