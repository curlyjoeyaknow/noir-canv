<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="cloud-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="50%" style="stop-color:#6b6b6b"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="light-shaft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="#2d2d2d"/>
  <ellipse cx="300" cy="400" rx="350" ry="250" fill="url(#cloud-dark)"/>
  <ellipse cx="200" cy="350" rx="180" ry="220" fill="#5a5a5a"/>
  <ellipse cx="400" cy="380" rx="200" ry="200" fill="#555"/>
  <ellipse cx="300" cy="450" rx="250" ry="180" fill="#4a4a4a"/>
  <rect x="250" y="0" width="100" height="400" fill="url(#light-shaft)"/>
  <rect x="280" y="0" width="40" height="500" fill="url(#light-shaft)"/>
</svg>
