    </filter>
  </defs>
  <rect width="600" height="800" fill="#0a0a0a"/>
  <path d="M150 800 L150 100 L300 50 L450 100 L450 800 Z" fill="url(#silver)" filter="url(#glow-silver)" opacity="0.95"/>
  <path d="M170 780 L170 120 L300 80 L430 120 L430 780 Z" fill="none" stroke="url(#silver)" stroke-width="3" opacity="0.8"/>
