<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="mm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1F2A"/>
      <stop offset="40%" stop-color="#2A303A"/>
      <stop offset="70%" stop-color="#354040"/>
      <stop offset="100%" stop-color="#1A2020"/>
    </linearGradient>
    <linearGradient id="mm-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0C8D0" stop-opacity="0"/>
      <stop offset="40%" stop-color="#D8E0E8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#E8F0F5" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#D8E0E8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C0C8D0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#mm-sky)"/>
  <!-- Distant hills — lightest, most grey -->
  <path d="M0,380 Q80,340 150,355 Q220,370 280,345 Q340,320 400,340 Q460,360 520,335 Q560,320 600,340 L600,450 L0,450 Z" fill="#3A4540" opacity="0.5"/>
  <!-- Mid hills -->
  <path d="M0,430 Q60,400 130,415 Q200,430 270,405 Q330,385 400,410 Q470,435 540,400 Q570,390 600,405 L600,520 L0,520 Z" fill="#2D3832" opacity="0.6"/>
  <!-- Nearer hills -->
  <path d="M0,490 Q80,460 170,475 Q250,490 320,465 Q390,445 460,470 Q530,495 580,465 Q600,458 600,480 L600,580 L0,580 Z" fill="#232E28" opacity="0.7"/>
  <!-- Foreground hill -->
  <path d="M0,560 Q100,530 200,545 Q300,560 380,535 Q460,515 540,540 Q580,550 600,545 L600,660 L0,660 Z" fill="#1A2520" opacity="0.8"/>
  <!-- Near-black bottom -->
  <rect x="0" y="640" width="600" height="160" fill="#0D1510" opacity="0.9"/>
  <path d="M0,640 Q150,630 300,645 Q450,655 600,640 L600,680 L0,680 Z" fill="#141E18" opacity="0.7"/>
  <!-- Silver-white glow at horizon -->
  <rect x="0" y="330" width="600" height="80" fill="url(#mm-glow)"/>
  <!-- Thin bright horizon line -->
  <line x1="0" y1="370" x2="600" y2="370" stroke="#E8F0F5" stroke-width="1" opacity="0.3"/>
  <!-- Fog — semi-transparent white ellipses scattered -->
  <ellipse cx="80" cy="420" rx="100" ry="20" fill="#C8D0D8" opacity="0.06"/>
  <ellipse cx="250" cy="440" rx="120" ry="18" fill="#D0D8E0" opacity="0.07"/>
  <ellipse cx="420" cy="410" rx="90" ry="22" fill="#C0C8D0" opacity="0.05"/>
  <ellipse cx="520" cy="450" rx="110" ry="16" fill="#C8D0D8" opacity="0.06"/>
  <ellipse cx="150" cy="470" rx="130" ry="20" fill="#D0D8E0" opacity="0.05"/>
  <ellipse cx="350" cy="460" rx="100" ry="25" fill="#C0C8D0" opacity="0.07"/>
  <ellipse cx="500" cy="480" rx="80" ry="18" fill="#C8D0D8" opacity="0.04"/>
  <ellipse cx="100" cy="500" rx="140" ry="22" fill="#D0D8E0" opacity="0.05"/>
  <ellipse cx="300" cy="490" rx="110" ry="15" fill="#C0C8D0" opacity="0.06"/>
  <ellipse cx="480" cy="510" rx="90" ry="20" fill="#C8D0D8" opacity="0.04"/>
  <!-- Wisps of fog near foreground -->
  <ellipse cx="200" cy="550" rx="160" ry="12" fill="#B0B8C0" opacity="0.035"/>
  <ellipse cx="400" cy="570" rx="120" ry="10" fill="#A0A8B0" opacity="0.03"/>
</svg>