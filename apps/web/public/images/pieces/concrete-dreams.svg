<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="cd-bg" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#808080"/>
      <stop offset="30%" stop-color="#757575"/>
      <stop offset="70%" stop-color="#6A6A6A"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#cd-bg)"/>
  <!-- Concrete texture -->
  <g fill="#888" opacity="0.08">
    <rect x="20" y="15" width="3" height="1"/><rect x="100" y="40" width="2" height="2"/>
    <rect x="250" y="30" width="4" height="1"/><rect x="400" y="20" width="2" height="3"/>
    <rect x="520" y="50" width="3" height="1"/><rect x="80" y="120" width="2" height="2"/>
    <rect x="340" y="100" width="3" height="1"/><rect x="480" y="130" width="4" height="2"/>
    <rect x="150" y="700" width="3" height="1"/><rect x="450" y="720" width="2" height="2"/>
  </g>
  <!-- Scratch marks -->
  <g stroke="#999" stroke-width="0.5" opacity="0.12">
    <line x1="30" y1="200" x2="90" y2="195"/>
    <line x1="400" y1="650" x2="500" y2="645"/>
    <line x1="100" y1="750" x2="200" y2="748"/>
    <line x1="450" y1="150" x2="530" y2="148"/>
    <line x1="50" y1="500" x2="120" y2="497"/>
  </g>
  <!-- Drip marks -->
  <rect x="480" y="100" width="4" height="120" rx="2" fill="#555" opacity="0.15"/>
  <rect x="120" y="300" width="3" height="80" rx="1.5" fill="#555" opacity="0.12"/>
  <rect x="500" y="400" width="3.5" height="100" rx="1.8" fill="#555" opacity="0.1"/>
  <!-- Crown motif — Basquiat style -->
  <g transform="translate(200,80)">
    <path d="M0,80 L0,30 L30,0 L60,30 L60,0 L90,30 L120,0 L120,30 L150,0 L150,30 L180,0 L180,30 L210,0 L210,80" 
      fill="none" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="30" y1="50" x2="30" y2="75" stroke="#222" stroke-width="3"/>
    <line x1="105" y1="50" x2="105" y2="75" stroke="#222" stroke-width="3"/>
    <line x1="180" y1="50" x2="180" y2="75" stroke="#222" stroke-width="3"/>
    <rect x="10" y="80" width="190" height="8" fill="#222" opacity="0.8"/>
  </g>
  <!-- Red accents on crown -->
  <circle cx="230" cy="100" r="8" fill="#CC2222" opacity="0.7"/>
  <circle cx="305" cy="100" r="6" fill="#CC2222" opacity="0.6"/>
  <circle cx="380" cy="100" r="7" fill="#CC2222" opacity="0.65"/>
  <!-- Crude face/skull — one eye bigger -->
  <g transform="translate(150,200)">
    <!-- Head outline — rough -->
    <path d="M50,0 Q20,10 10,50 Q5,100 15,150 Q30,200 80,220 Q120,230 170,230 Q230,225 250,200 Q275,170 280,120 Q282,80 270,40 Q255,10 220,0 Q180,-5 140,-5 Q90,-5 50,0 Z" 
      fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Left eye — bigger, rough circle -->
    <ellipse cx="100" cy="90" rx="40" ry="42" fill="none" stroke="#222" stroke-width="3"/>
    <circle cx="100" cy="90" r="15" fill="#222"/>
    <!-- Right eye — smaller -->
    <ellipse cx="210" cy="95" rx="28" ry="30" fill="none" stroke="#222" stroke-width="3"/>
    <circle cx="210" cy="95" r="10" fill="#222"/>
    <!-- Nose — just lines -->
    <line x1="155" y1="100" x2="148" y2="140" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="148" y1="140" x2="160" y2="145" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mouth — jagged teeth -->
    <path d="M80,175 L100,170 L110,180 L125,168 L140,178 L155,170 L170,180 L185,168 L200,178 L215,172 L230,175" 
      fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Teeth lines -->
    <line x1="110" y1="170" x2="110" y2="180" stroke="#222" stroke-width="1.5"/>
    <line x1="140" y1="168" x2="140" y2="178" stroke="#222" stroke-width="1.5"/>
    <line x1="170" y1="170" x2="170" y2="180" stroke="#222" stroke-width="1.5"/>
    <line x1="200" y1="168" x2="200" y2="178" stroke="#222" stroke-width="1.5"/>
  </g>
  <!-- Yellow accents -->
  <rect x="100" y="340" width="30" height="30" fill="#E8C820" opacity="0.7" transform="rotate(12,115,355)"/>
  <rect x="420" y="280" width="25" height="25" fill="#E8C820" opacity="0.6" transform="rotate(-8,432,292)"/>
  <!-- Scattered symbols — arrows, crosses, zigzag -->
  <g stroke="#222" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6">
    <!-- Arrow right -->
    <path d="M50,480 L100,480 L90,470 M100,480 L90,490"/>
    <!-- Arrow up -->
    <path d="M480,500 L480,450 L470,460 M480,450 L490,460"/>
    <!-- Cross -->
    <line x1="510" y1="300" x2="540" y2="330"/>
    <line x1="540" y1="300" x2="510" y2="330"/>
    <!-- Zigzag -->
    <path d="M70,600 L85,580 L100,600 L115,580 L130,600"/>
    <!-- Another cross -->
    <line x1="430" y1="580" x2="460" y2="610"/>
    <line x1="460" y1="580" x2="430" y2="610"/>
  </g>
  <!-- Red drips from skull -->
  <rect x="168" y="430" width="3" height="50" rx="1.5" fill="#CC2222" opacity="0.5"/>
  <rect x="300" y="425" width="2.5" height="40" rx="1.2" fill="#CC2222" opacity="0.4"/>
  <!-- More scattered marks -->
  <circle cx="70" cy="380" r="4" fill="#222" opacity="0.3"/>
  <circle cx="530" cy="450" r="5" fill="#222" opacity="0.25"/>
  <!-- Basquiat-style radiating lines around head -->
  <g stroke="#222" stroke-width="1.5" opacity="0.25" stroke-linecap="round">
    <line x1="130" y1="195" x2="100" y2="170"/>
    <line x1="155" y1="185" x2="140" y2="155"/>
    <line x1="300" y1="185" x2="315" y2="155"/>
    <line x1="350" y1="195" x2="380" y2="170"/>
    <line x1="450" y1="230" x2="480" y2="215"/>
  </g>
  <!-- Yellow star/copyright symbol -->
  <g transform="translate(520,680)">
    <circle r="20" fill="none" stroke="#E8C820" stroke-width="2" opacity="0.5"/>
    <path d="M-8,-5 Q0,-15 8,-5 Q12,0 8,5 Q0,12 -8,5 Q-12,0 -8,-5" fill="#E8C820" opacity="0.4"/>
  </g>
</svg>