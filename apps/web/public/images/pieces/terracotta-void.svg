<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="tv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="50%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <radialGradient id="tv-circle" cx="0.5" cy="0.5" r="0.5" fx="0.45" fy="0.42">
      <stop offset="0%" stop-color="#D4734E" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#C4633E" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#B85535" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#A0442A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B3520" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="tv-inner" cx="0.48" cy="0.46" r="0.35">
      <stop offset="0%" stop-color="#E88A6A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4633E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tv-ambient" cx="0.47" cy="0.42" r="0.4">
      <stop offset="0%" stop-color="#C4633E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#333" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#tv-bg)"/>
  <!-- Subtle ambient glow around circle area -->
  <ellipse cx="280" cy="340" rx="220" ry="220" fill="url(#tv-ambient)"/>
  <!-- Main circle — slightly off-center, imperfect -->
  <ellipse cx="280" cy="335" rx="155" ry="160" fill="url(#tv-circle)"/>
  <!-- Inner depth glow -->
  <ellipse cx="270" cy="325" rx="110" ry="115" fill="url(#tv-inner)"/>
  <!-- Subtle surface variation -->
  <ellipse cx="260" cy="310" rx="70" ry="75" fill="#E88A6A" opacity="0.08"/>
  <ellipse cx="300" cy="360" rx="80" ry="60" fill="#8B3520" opacity="0.1"/>
  <!-- Thin horizontal terracotta line below -->
  <line x1="120" y1="580" x2="480" y2="580" stroke="#B85535" stroke-width="1.8" opacity="0.55" stroke-linecap="round"/>
  <!-- Very subtle reflection of circle below line -->
  <ellipse cx="280" cy="620" rx="40" ry="5" fill="#B85535" opacity="0.06"/>
  <!-- Charcoal field texture — sparse -->
  <g fill="#444" opacity="0.06">
    <rect x="45" y="50" width="2" height="2"/>
    <rect x="520" y="120" width="2" height="2"/>
    <rect x="80" y="650" width="2" height="2"/>
    <rect x="490" y="700" width="2" height="2"/>
    <rect x="300" y="750" width="2" height="2"/>
    <rect x="550" y="400" width="2" height="2"/>
    <rect x="30" y="350" width="2" height="2"/>
  </g>
</svg>