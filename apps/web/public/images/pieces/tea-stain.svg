<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="ts-paper" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#F5EDD8"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </radialGradient>
    <radialGradient id="ts-stain1" cx="0.45" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#8B6B40" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#9B7B50" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#A08A5A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#B09868" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="ts-stain2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7A5A30" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#8B6B40" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9B7B50" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="ts-deep" cx="0.48" cy="0.48" r="0.4">
      <stop offset="0%" stop-color="#5A3A18" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#6B4A28" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#7A5A30" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B6B40" stop-opacity="0.04"/>
    </radialGradient>
    <radialGradient id="ts-ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="70%" stop-color="#8B6B40" stop-opacity="0"/>
      <stop offset="85%" stop-color="#7A5A30" stop-opacity="0.15"/>
      <stop offset="95%" stop-color="#6B4A28" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B6B40" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#ts-paper)"/>
  <!-- Parchment texture — tiny dots for noise -->
  <g fill="#C8B890" opacity="0.04">
    <circle cx="20" cy="15" r="1"/><circle cx="55" cy="30" r="0.8"/><circle cx="90" cy="12" r="1.2"/>
    <circle cx="130" cy="45" r="0.6"/><circle cx="170" cy="25" r="1"/><circle cx="210" cy="50" r="0.8"/>
    <circle cx="250" cy="18" r="1.1"/><circle cx="300" cy="40" r="0.7"/><circle cx="340" cy="22" r="1"/>
    <circle cx="380" cy="55" r="0.9"/><circle cx="420" cy="15" r="0.8"/><circle cx="460" cy="45" r="1.2"/>
    <circle cx="500" cy="28" r="0.6"/><circle cx="540" cy="50" r="1"/><circle cx="580" cy="20" r="0.8"/>
    <circle cx="30" cy="780" r="1"/><circle cx="100" cy="770" r="0.8"/><circle cx="200" cy="785" r="1.1"/>
    <circle cx="300" cy="775" r="0.7"/><circle cx="400" cy="782" r="0.9"/><circle cx="500" cy="770" r="1"/>
    <circle cx="80" cy="400" r="0.8"/><circle cx="520" cy="350" r="1"/><circle cx="40" cy="600" r="0.9"/>
    <circle cx="560" cy="550" r="0.7"/><circle cx="100" cy="200" r="1.1"/><circle cx="500" cy="180" r="0.8"/>
  </g>
  <!-- Large stain — upper area -->
  <ellipse cx="260" cy="280" rx="150" ry="140" fill="url(#ts-stain1)"/>
  <!-- Ring mark within large stain -->
  <ellipse cx="260" cy="280" rx="80" ry="75" fill="url(#ts-ring)"/>
  <!-- Overlapping medium stain -->
  <ellipse cx="350" cy="380" rx="120" ry="110" fill="url(#ts-stain2)"/>
  <!-- Small stain cluster -->
  <ellipse cx="200" cy="450" rx="80" ry="70" fill="url(#ts-stain1)" opacity="0.7"/>
  <ellipse cx="180" cy="420" rx="50" ry="45" fill="url(#ts-stain2)" opacity="0.6"/>
  <!-- The deep stain — more saturated center -->
  <ellipse cx="320" cy="330" rx="70" ry="65" fill="url(#ts-deep)"/>
  <!-- Drip trail from stain -->
  <path d="M350,440 Q355,480 352,520 Q348,560 355,600 Q360,630 358,660" 
    fill="none" stroke="#8B6B40" stroke-width="8" stroke-linecap="round" opacity="0.06"/>
  <path d="M352,445 Q356,475 354,510 Q350,545 355,580" 
    fill="none" stroke="#7A5A30" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  <!-- Smaller scattered stains -->
  <circle cx="420" cy="200" r="40" fill="url(#ts-stain1)" opacity="0.5"/>
  <circle cx="150" cy="580" r="35" fill="url(#ts-stain2)" opacity="0.4"/>
  <circle cx="450" cy="550" r="50" fill="url(#ts-stain1)" opacity="0.35"/>
  <!-- Tiny droplets -->
  <circle cx="380" cy="160" r="8" fill="#8B6B40" opacity="0.08"/>
  <circle cx="475" cy="230" r="6" fill="#7A5A30" opacity="0.1"/>
  <circle cx="130" cy="350" r="10" fill="#8B6B40" opacity="0.06"/>
  <circle cx="480" cy="420" r="7" fill="#6B4A28" opacity="0.08"/>
  <circle cx="120" cy="650" r="8" fill="#8B6B40" opacity="0.05"/>
  <!-- Edge darkening — aged paper effect -->
  <rect x="0" y="0" width="600" height="20" fill="#C8B890" opacity="0.05"/>
  <rect x="0" y="780" width="600" height="20" fill="#C8B890" opacity="0.06"/>
  <rect x="0" y="0" width="15" height="800" fill="#C8B890" opacity="0.04"/>
  <rect x="585" y="0" width="15" height="800" fill="#C8B890" opacity="0.04"/>
</svg>