<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <pattern id="cp-stripes" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#FFB6C1" opacity="0.3"/>
      <rect x="10" width="10" height="20" fill="#FFFFFF" opacity="0.3"/>
    </pattern>
    <linearGradient id="cp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#F0E8FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#cp-bg)"/>
  <!-- Candy-striped background -->
  <rect width="600" height="800" fill="url(#cp-stripes)"/>
  <!-- KAWS-style companion sitting cross-legged -->
  <!-- Body — soft pink roundish torso -->
  <ellipse cx="300" cy="450" rx="110" ry="130" fill="#FFB6C1" stroke="#222" stroke-width="4"/>
  <!-- Legs crossed -->
  <path d="M210,530 Q200,580 220,620 Q240,650 280,650 Q300,648 310,630 Q320,610 300,590 Q280,575 260,560" fill="#E6E6FA" stroke="#222" stroke-width="4"/>
  <path d="M390,530 Q400,580 380,620 Q360,650 320,650 Q300,648 290,630 Q280,610 300,590 Q320,575 340,560" fill="#E6E6FA" stroke="#222" stroke-width="4"/>
  <!-- Feet -->
  <ellipse cx="250" cy="660" rx="35" ry="18" fill="#FFEFD5" stroke="#222" stroke-width="3"/>
  <ellipse cx="350" cy="660" rx="35" ry="18" fill="#FFEFD5" stroke="#222" stroke-width="3"/>
  <!-- Arms -->
  <path d="M200,420 Q170,440 160,470 Q155,490 165,500 Q175,508 190,500 Q200,490 210,470" fill="#FFB6C1" stroke="#222" stroke-width="4"/>
  <path d="M400,420 Q430,440 440,470 Q445,490 435,500 Q425,508 410,500 Q400,490 390,470" fill="#FFB6C1" stroke="#222" stroke-width="4"/>
  <!-- Hands -->
  <circle cx="165" cy="505" r="22" fill="#FFEFD5" stroke="#222" stroke-width="3"/>
  <circle cx="435" cy="505" r="22" fill="#FFEFD5" stroke="#222" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="300" cy="300" rx="90" ry="100" fill="#98FB98" stroke="#222" stroke-width="4"/>
  <!-- Ears -->
  <ellipse cx="215" cy="240" rx="25" ry="40" fill="#98FB98" stroke="#222" stroke-width="3" transform="rotate(-10,215,240)"/>
  <ellipse cx="385" cy="240" rx="25" ry="40" fill="#98FB98" stroke="#222" stroke-width="3" transform="rotate(10,385,240)"/>
  <!-- Inner ears -->
  <ellipse cx="215" cy="240" rx="15" ry="25" fill="#FFB6C1" opacity="0.5" transform="rotate(-10,215,240)"/>
  <ellipse cx="385" cy="240" rx="15" ry="25" fill="#FFB6C1" opacity="0.5" transform="rotate(10,385,240)"/>
  <!-- X Eyes — signature KAWS -->
  <g stroke="#222" stroke-width="5" stroke-linecap="round">
    <line x1="250" y1="278" x2="278" y2="306"/>
    <line x1="278" y1="278" x2="250" y2="306"/>
    <line x1="322" y1="278" x2="350" y2="306"/>
    <line x1="350" y1="278" x2="322" y2="306"/>
  </g>
  <!-- Nose -->
  <ellipse cx="300" cy="330" rx="8" ry="6" fill="#222" opacity="0.5"/>
  <!-- Mouth — simple line -->
  <path d="M275,355 Q300,368 325,355" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Belly button / shirt detail -->
  <circle cx="300" cy="460" r="12" fill="none" stroke="#222" stroke-width="2" opacity="0.4"/>
  <!-- Pastel collar -->
  <path d="M230,380 Q265,395 300,398 Q335,395 370,380" fill="none" stroke="#E6E6FA" stroke-width="6" stroke-linecap="round"/>
  <!-- Shadow under character -->
  <ellipse cx="300" cy="690" rx="140" ry="15" fill="#222" opacity="0.08"/>
</svg>