<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="kv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4793D"/>
      <stop offset="50%" stop-color="#B5651D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="kv-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="kv-glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#F5DEB3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B4513" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#kv-bg)"/>
  <!-- Rothko-inspired color blocking -->
  <rect x="40" y="30" width="320" height="160" rx="2" fill="#A0522D" opacity="0.5"/>
  <rect x="50" y="40" width="300" height="140" rx="1" fill="#CD853F" opacity="0.35"/>
  <rect x="40" y="220" width="320" height="150" rx="2" fill="#6B3A2A" opacity="0.45"/>
  <rect x="55" y="230" width="290" height="130" rx="1" fill="#8B6914" opacity="0.3"/>
  <!-- Negative space portrait outline — just suggestion of a head -->
  <path d="M160,80 Q155,60 170,50 Q190,35 215,38 Q240,42 250,60 Q258,78 255,100 Q253,120 250,140 Q248,155 240,168 Q230,182 220,188 Q210,192 200,194 Q190,192 180,188 Q170,182 162,168 Q155,155 152,140 Q148,120 148,100 Q148,88 160,80 Z" fill="url(#kv-bg)" opacity="0.92"/>
  <!-- Two horizontal lines suggesting eyes — the core of the portrait -->
  <line x1="172" y1="108" x2="193" y2="108" stroke="#3E2216" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="212" y1="108" x2="233" y2="108" stroke="#3E2216" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Subtle nose suggestion -->
  <line x1="202" y1="120" x2="200" y2="145" stroke="#3E2216" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <!-- Warm glow in negative space -->
  <ellipse cx="200" cy="120" rx="55" ry="70" fill="url(#kv-glow)"/>
  <!-- Neck/shoulder negative space -->
  <path d="M185,194 Q180,220 170,250 Q155,280 120,310 L120,400 L280,400 L280,310 Q245,280 230,250 Q220,220 215,194" fill="url(#kv-bg)" opacity="0.88"/>
  <!-- Agnes Martin inspired fine lines -->
  <g opacity="0.12" stroke="#F5DEB3" stroke-width="0.5">
    <line x1="0" y1="195" x2="400" y2="195"/>
    <line x1="0" y1="198" x2="400" y2="198"/>
    <line x1="0" y1="201" x2="400" y2="201"/>
    <line x1="0" y1="204" x2="400" y2="204"/>
    <line x1="0" y1="207" x2="400" y2="207"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="213" x2="400" y2="213"/>
    <line x1="0" y1="216" x2="400" y2="216"/>
  </g>
  <!-- Thin separating line -->
  <line x1="60" y1="200" x2="340" y2="200" stroke="#2C1810" stroke-width="1" opacity="0.5"/>
</svg>