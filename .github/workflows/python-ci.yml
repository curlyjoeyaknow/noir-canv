name: Python Pipeline CI

on:
  push:
    branches: ["**"]
    paths:
      - "pipeline/**"
      - "packages/shared/schemas/**"
  pull_request:
    branches: ["**"]
    paths:
      - "pipeline/**"
      - "packages/shared/schemas/**"

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml
      - run: pip install ruff
      - run: ruff check pipeline/src/
      - run: ruff format --check pipeline/src/

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml
      - run: pip install -e "./pipeline[dev]"
      - run: mypy pipeline/src/

  test:
    name: Pytest
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml
      - run: pip install -e "./pipeline[dev]"
      - run: pytest pipeline/tests/ --junitxml=pytest-results.xml
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest-results.xml
          retention-days: 7
