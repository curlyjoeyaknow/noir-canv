bio: Fenna Haas paints from a countryside studio in the Netherlands, where the garden
  outside her window is maintained with a care that suggests she finds animals more
  interesting than people. Her small-format paintings give rodents, birds, and foxes
  the compositional dignity of Renaissance portraiture — muted umber and olive grounds,
  delicate linework, an expression that carries the full weight of human emotional
  life without once trying to. Collectors describe the work as "quietly devastating."
statement: An animal never poses. That is what makes them harder to paint and more
  honest to look at.
