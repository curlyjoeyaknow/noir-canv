bio: Hiro Tomo trained under traditional Japanese irezumi masters in Osaka before
  developing a gallery practice that carries the discipline and sacred iconography
  of body art onto fine canvas. His primary subject is the cat — rendered with the
  compositional reverence given to dragons and guardian deities in classical Japanese
  tattooing. Koi, chrysanthemums, and waves orbit his subjects like mythological
  attributes. The work sits at a rare intersection of craft tradition and contemporary
  art market, attracting collectors from both worlds.
statement: The tattoo artist works on skin that breathes and ages. I work on canvas
  that outlasts us both. The cat, of course, outlasts everyone.
