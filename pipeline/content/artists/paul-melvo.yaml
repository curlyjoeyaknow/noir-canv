bio: Paul Melvo distills the visual world into its most essential lines. Working
  in a tradition rooted in mid-century graphic design and Japanese woodblock printing,
  he builds compositions from bold outlines, flat planes of color, and a disciplined
  restraint that gives each piece its commanding presence. His work strips subjects
  to their iconic core — the silhouette, the gesture, the single defining detail —
  and renders them with the confident authority of a master printmaker.
statement: "Reduction is not loss. Every line I remove is a decision\u2014a choice
  to trust the image with less. The shape that remains is the truth of the thing."
