bio: Bea Gomez works from a small apartment in Barcelona where the objects on her
  windowsill have been arranged with too much care for someone who claims not to be
  precious about things. Her clean-line illustrations practice a kind of radical
  attention — the unremarkable given enough space and clarity that you see it properly
  for the first time. A cup of tea, a dog in a doorway, a single sock mid-air. Her
  palette runs from warm sage to dusty coral, with the occasional shock of yellow
  that makes you briefly, inexplicably happy.
statement: I am interested in the things you have stopped noticing. I am trying to
  return them to you.
