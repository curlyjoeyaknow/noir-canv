bio: Mae Ryden paints in the unsettling space between a child's music box and something
  older and stranger underneath. Working in small-format oil panels, she builds tableaux
  where wide-eyed porcelain-skinned figures share space with carnival automata, candy
  ephemera, and Victorian keepsakes rendered with obsessive precision. Her work has
  accumulated a devoted collector base drawn to its quality of beautiful wrongness —
  too meticulous to be naive, too sweet to be a warning.
statement: I paint the way a music box sounds — innocent on the surface, mechanical
  underneath, and somehow both at once.
