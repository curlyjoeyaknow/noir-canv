bio: Rave Zola's paintings arrive looking like they belong in a museum. Then you notice
  what they are actually saying. Working in the tradition of figurative oil painting,
  Zola applies Old Master technique — the lighting is Caravaggio, the compositional
  authority is Velázquez — to contemporary subjects that have something urgent to
  communicate. The gallery world has taken notice. Several major collections have
  acquired pieces without quite knowing how to categorise them, which is exactly
  where Zola wants to be.
statement: Great painting technique is a Trojan horse. You let it through the gates
  before you realise what is inside.
